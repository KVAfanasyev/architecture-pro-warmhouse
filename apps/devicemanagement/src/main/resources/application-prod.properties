# Spring Docker Compose
spring.docker.compose.file=${DOCKER_COMPOSE_FILE:.//devicemanagement//compose.yaml}

# DataSource
spring.datasource.url=${DATASOURCE_URL:jdbc:postgresql://localhost:5432/device_management}
spring.datasource.username=${DATASOURCE_USERNAME:smartHome}
spring.datasource.password=${DATASOURCE_PASSWORD:password123}
spring.datasource.driver-class-name=${DATASOURCE_DRIVER:org.postgresql.Driver}

# JPA
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:create}
spring.jpa.properties.hibernate.dialect=${JPA_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:true}
spring.jpa.properties.hibernate.show_sql=${JPA_SHOW_SQL:true}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:rabbitmq}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:admin}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:admin123}
spring.rabbitmq.virtual-host=${RABBITMQ_VIRTUAL_HOST:/}
logging.level.org.springframework.amqp=DEBUG
logging.level.com.rabbitmq=DEBUG

# Flyway

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.table=flyway_schema_history
spring.flyway.baseline-on-migrate=true

# Management endpoints
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,info,metrics,env

management.endpoints.web.base-path=/actuator


# Logging
logging.level.com.smarthome.devicemanagement=${LOG_LEVEL_APP:DEBUG}
logging.level.org.hibernate.SQL=${LOG_LEVEL_HIBERNATE_SQL:DEBUG}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${LOG_LEVEL_HIBERNATE_BINDER:TRACE}

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# WebFlux
springdoc.swagger-ui.use-root-path=false

# WebFlux static resources
spring.webflux.static-path-pattern=/**




