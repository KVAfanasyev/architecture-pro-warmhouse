version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin123
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: -rabbitmq_management load_definitions "/etc/rabbitmq/definitions.json"
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./config/definitions.json:/etc/rabbitmq/definitions.json
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: device_management
      POSTGRES_USER: smartHome
      POSTGRES_PASSWORD: password123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/db/migration/:/docker-entrypoint-initdb.d/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartHome -d device_management"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  device-management:
    build: .
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/device_management
      SPRING_DATASOURCE_USERNAME: smartHome
      SPRING_DATASOURCE_PASSWORD: password123
      SPRING_JPA_HIBERNATE_DDL_AUTO: create
      LOGGING_LEVEL_COM_EXAMPLE: INFO
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: admin
      RABBITMQ_PASSWORD: admin123
      RABBITMQ_VIRTUAL_HOST: /
      RABBITMQ_CONNECTION_TIMEOUT: 10000
      RABBITMQ_REPLY_TIMEOUT: 60000
      RABBITMQ_LISTENER_AUTO_STARTUP: true
      RABBITMQ_DIRECT_LISTENER_AUTO_STARTUP: true
    ports:
      - "8080:8080"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network


volumes:
  rabbitmq_data:
  postgres_data:

networks:
  app-network:
    driver: bridge